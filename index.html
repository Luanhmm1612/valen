<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gửi ebe của anh 💌</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #cfefff;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== HEART BACKGROUND ===== */
.heart {
  position: absolute;
  font-size: 30px;
  opacity: 0.4;
}

.flower {
    position: absolute;
    width: 200px;
    height: 200px;
    background-size: contain;
    background-repeat: no-repeat;
    animation: float 10s linear infinite;
    opacity: 1;
    pointer-events: none;
}


@keyframes float {
    0% {
        transform: translateY(110vh) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) rotate(360deg);
        opacity: 0;
    }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== ENVELOPE ===== */
.wrapper {
  position: relative;
}

.envelope {
  width: 480px;
  height: 300px;
  background: #f28ab2;
  border: 4px solid #e15a92;
  border-radius: 14px;
  position: relative;
  cursor: pointer;
  transform: rotate(-3deg);
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

.envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  border-left: 240px solid transparent;
  border-right: 240px solid transparent;
  border-top: 160px solid #f5a1c3;
  transform-origin: top;
  transition: transform 0.8s ease;
}

.envelope.open::before {
  transform: rotateX(180deg);
}

/* TEXT ON ENVELOPE */
.envelope-text {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
  font-weight: bold;
  color: white;
  font-size: 26px;
}

/* ===== LETTER ===== */
.letter {
  position: absolute;
  width: 680px;
  height: 380px;
  background: white;
  border-radius: 16px;
  top: 40px;
  left: -100px;
  display: flex;
  padding: 24px;
  gap: 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  opacity: 0;
  transform: translateY(60px) scale(0.9);
  transition: all 0.9s ease;
}

.envelope.open + .letter {
  opacity: 1;
  transform: translateY(-140px) scale(1);
}

.letter img {
  width: 45%;
  border-radius: 14px;
  object-fit: cover;
}

.text {
  width: 55%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.text h1 {
  color: #ff4f87;
  font-size: 42px;      /* to hơn */
  text-align: center;  /* căn giữa */
  margin-bottom: 20px;
}

.text p {
  font-size: 22px;     /* chữ nội dung to hơn */
  line-height: 1.6;
  
}
</style>
</head>

<body>

<!-- HEARTS -->
<script>
const hearts = ["💗","💖","💘","💕"];

for (let i = 0; i < 30; i++) {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];
  h.style.left = Math.random()*100 + "vw";
  h.style.top = Math.random()*100 + "vh";
  document.body.appendChild(h);
}
</script>

<script>
/* HOA BAY */

/* HOA BAY = ẢNH */
const flowerImages = [
  "banh.png",
  "banh2.jpg",
  "banh3.png",
  "banh4.jpg",
  "banh5.jpg",
  "banh7.jpg",
  "banh8.png",
  "banh9.jpg",
  "banh10.png",
  "banh11.jpg",
  "banh12.jpg"
];

function createFlower() {
    const flower = document.createElement("div");
    flower.className = "flower";

    const img = flowerImages[Math.floor(Math.random() * flowerImages.length)];
    flower.style.backgroundImage = `url(${img})`;

    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (Math.random() * 4 + 8) + "s";
    flower.style.transform = `rotate(${Math.random() * 360}deg)`;

    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 12000);
}

setInterval(createFlower, 900);
</script>



<!-- AUDIO (NO AUTOPLAY) -->
<audio id="music" loop>
  <source src="nhac.mp3" type="audio/mpeg">
</audio>

<div class="wrapper">
  <div class="envelope" onclick="openLetter()">
    <div class="envelope-text"> 💖💖💖</div>
  </div>

  <div class="letter">
    <img src="banh.png">
    <div class="text">
      <h1>Happi 8/3🌼🌼 </h1>
      <p>
        For duuuu <br>
      
      Chúc em 10/3 vui vẻ nhaa
      . <br>Cgi em cũng có r nên a đ biết chúc j
      🍰 🥤 🍰 🥤 🍰 🥤 
      </p>
    </div>
  </div>
</div>

<script>
let opened = false;
function openLetter() {
  if (opened) return;
  opened = true;
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("music").play();
}

</script>

</body>
</html>
